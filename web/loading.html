<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ultrafoot 26</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#090a0f;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;color:#fff;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;}
.c{text-align:center;animation:fadeIn .6s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.t{font-size:1.6rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#d4ff00,#a3cc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:32px;}
.bar-bg{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto;overflow:hidden}
.bar{height:100%;background:#d4ff00;border-radius:2px;animation:load 8s ease-in-out forwards}
@keyframes load{0%{width:0}60%{width:70%}100%{width:95%}}
.st{margin-top:12px;font-size:11px;color:#5a6275;letter-spacing:1px}
</style>
</head>
<body>
<div class="c">
    <div class="t">ULTRAFOOT 26</div>
    <div class="bar-bg"><div class="bar"></div></div>
    <div class="st">Iniciando motor do jogo...</div>
</div>
</body>
</html>
